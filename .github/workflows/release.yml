# Publish a tagged release to the Chrome Web Store.
#
# Trigger: push a tag `v<version>` matching the version in src/manifest.json
# (e.g. `git tag v0.2.1 && git push origin v0.2.1`). The store then reviews
# the submission; approval publishes automatically.
#
# Requires a single repo secret, `DOPPLER_TOKEN` — a Doppler service token
# scoped to the config that holds the store-publish credentials. It supplies
# these at runtime (see store/PUBLISHING.md for how to set them up):
#   CWS_EXTENSION_ID, CWS_CLIENT_ID, CWS_CLIENT_SECRET, CWS_REFRESH_TOKEN

name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run verify

      - name: Check tag matches manifest version
        run: |
          MANIFEST_VERSION=$(node -p "require('./src/manifest.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$MANIFEST_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME does not match manifest version $MANIFEST_VERSION" >&2
            exit 1
          fi

      - name: Package
        run: npm run package

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: askfutures-clipper
          path: askfutures-clipper.zip

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v4

      - name: Publish to Chrome Web Store
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: doppler run -- bash store/publish-chrome.sh
